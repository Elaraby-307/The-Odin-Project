<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="./script.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./main.css">

</head>
<body>
    <div id="container">

        <div id="input">
            <p>Click buttons</p>
        </div>    

        <div id="nums">

            <div class="first part">
                <button class="btn nom">1</button>
                <button class="btn nom">2</button>
                <button class="btn nom">3</button>
                
            </div>

            <div class="second part">
                <button class="btn nom">4</button>
                <button class="btn nom">5</button>
                <button class="btn nom">6</button>
                
            </div>

            <div class="third part">
                <button class="btn nom">7</button>
                <button class="btn nom">8</button>
                <button class="btn nom">9</button>
                
            </div>

            <div class="forth part">
                <button class="btn nom">0</button>
                <button class="btn division operator">/</button>
                <button class="btn multiplication operator">*</button>
            </div>
            
            <div class="fifth part">
                <button class="btn subtract operator">-</button>
                <button class="btn add operator">+</button>
                <button class="btn equal">=</button>
            </div>
            
            <div class="sixth part">
                <button class="btn icon-backspace backspace"></button>
                <button disabled class="btn comma">.</button>
                <button class="btn clear">Clear</button>
            </div>
            
            
            
        </div>
        
    </div>
</body>
</html>
