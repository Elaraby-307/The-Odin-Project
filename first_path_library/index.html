<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>library</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="./script.js"></script>
    <script defer src="secscript.js"></script>
</head>
<body>
    <div id="container">
        <div id="div">
            
        </div>
        <button id="btn">New Book</button>
    </div>
    <dialog id="dialog">
        <form id="form" >

            <input class="inp" type="text" placeholder="Enter book title" required>
            <input class="inp" type="text" placeholder="Enter book author" required>
            <input class="inp" type="number" placeholder="Nom of pages" required>
            <label for="read">have you read ?  </label>
            <input id="read" class="inp" type="checkbox" placeholder="Does book read before ?" required>
            
            <input type="submit" class="send">
        </form>
    </dialog>
</body>
</html>
