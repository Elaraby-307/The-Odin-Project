<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissories</title>
</head>
<body>
    <div id="container">
        <button class="btn">Scissories</button>
        <button class="btn">Paper</button>
        <button class="btn">Rock</button>
    </div>
    

    <style>
        #container{
            display: flex;
            justify-content: space-around;
            height: 50%;
        }
        .btn{
            background-color: greenyellow;
            color: black;
        }
    </style>
    <script>

        let Computer_Score = 0;
        let Human_Score = 0;

        
        let choices = ["Rock", "Paper", "Scissories"]
        

        
            
        const buttons = document.querySelectorAll(".btn");
        buttons.forEach(element => {
            element.addEventListener("click", (e)=>{
                const user_selection = e.target.textContent;
                const computer_choice = choices[Math.floor(Math.random() * choices.length)];
                play_round(user_selection, computer_choice)

            })
        });
            
        

        function play_round(humanChoice, computerChoice ){
            if(humanChoice === "Scissories" && computerChoice === "Paper"){
                
                Human_Score++;
                const div = document.createElement("div");
                div.textContent = `human won: \n human Score -> ${Human_Score}\n computer Score -> ${Computer_Score}`
                document.body.appendChild(div)
            }else if(humanChoice === "Paper" && computerChoice === "Scissories"){
                Computer_Score++;
                const div = document.createElement("div");
                div.textContent = `Computer won: \n human Score -> ${Human_Score}\n computer Score -> ${Computer_Score}`
                document.body.appendChild(div)

            }else if(humanChoice === "Rock" && computerChoice === "Paper"){
                Computer_Score++;
                const div = document.createElement("div");
                div.textContent = `Computer won: \n human Score -> ${Human_Score}\n computer Score -> ${Computer_Score}`
                document.body.appendChild(div)

            }else if(humanChoice === computerChoice){
                const div = document.createElement("div");
                div.textContent = `draw`
                document.body.appendChild(div)

            }else if(humanChoice === "Rock" && computerChoice === "Scissories" ){
                Human_Score++;
                const div = document.createElement("div");
                div.textContent = `human won: \n human Score -> ${Human_Score}\n computer Score -> ${Computer_Score}`
                
                document.body.appendChild(div)

            }else if(humanChoice === "Scissories" && computerChoice === "Rock"){
                Computer_Score++;
                const div = document.createElement("div");
                div.textContent = `computer won: \n human Score -> ${Human_Score}\n computer Score -> ${Computer_Score}`
                document.body.appendChild(div)

            }else if(humanChoice === "Paper" && computerChoice === "Rock"){
                Human_Score++;
                const div = document.createElement("div");
                div.textContent = `human won: \n human Score -> ${Human_Score}\n computer Score -> ${Computer_Score}`
                document.body.appendChild(div)

            }
            
            if(Human_Score === 5){
                const div2 = document.createElement("div");
                div2.textContent = `human won the entire play with 5 points`
                document.body.appendChild(div2)

            }else if (Computer_Score === 5 ){
                const div2 = document.createElement("div");
                div2.textContent = `Computer won the entire play with 5 points`
                document.body.appendChild(div2)

            }
        }

        

    

        
        



    </script>
</body>
</html>
